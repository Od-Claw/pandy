name: Update Stock Reports

on:
  workflow_dispatch:
  schedule:
    # 05:50 UTC = 13:50 Asia/Taipei, Monday through Friday.
    - cron: "50 5 * * 1-5"

permissions:
  contents: write

concurrency:
  group: stock-report-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --disable-pip-version-check requests
      - run: python scripts/update_stock_reports.py
      - name: Commit updated reports
        run: |
          if git diff --quiet -- pandy_data.html stock_data.html prof_data.html; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pandy_data.html stock_data.html prof_data.html
          git commit -m "Update stock price HTML reports $(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M')"
          git push
